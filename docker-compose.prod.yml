version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - tmr_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/tmr.db
      # Vercel deploy sonrası CORS_ORIGINS'i güncelle:
      # docker compose -f docker-compose.prod.yml up -d --build
      - CORS_ORIGINS=https://tmrrasyon.vercel.app,http://localhost:3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  tmr_data:
